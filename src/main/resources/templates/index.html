<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${titulo}">Title</title>
</head>
<body>
<div>
    <div th:insert="~{fragments/header :: header}"></div>

    <h1 th:text="${titol}">Título por defecto</h1>
    <p th:text="${mensaje}">Mensaje por defecto</p>

    <!-- iterar lista-->
    <ul>
        <li th:each="item: ${llista}" th:text="${item}"></li>
    </ul>
</div>
</body>
</html>
